<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diseño en Capas Animado</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0e0d0d;
    font-family:Arial;
}


.contenedor{
    width:600px;
    height:500px;
    margin:50px auto;
    position:relative;
}

@keyframes salir{
    0%{
        opacity:0;
        transform: translateY(300px) scale(0.8) rotate(0deg);
    }
    70%{
        opacity:1;
        transform: translateY(-20px) scale(1.05) rotate(8deg);
    }
    100%{
        opacity:1;
        transform: translateY(0px) scale(1) rotate(0deg);
    }
}

.caja1{
    width:240px;
    height:240px;
    background:white;
    position:absolute;
    top:20px;
    left:20px;
    z-index:1;
    overflow:hidden;
    box-shadow: 0px 8px 20px rgba(253, 253, 253, 0.6);
    animation: salir 1.2s ease-out forwards;
}


.caja2{
    width:240px;
    height:240px;
    background:white;
    position:absolute;
    top:70px;
    left:70px;
    z-index:2;
    overflow:hidden;
    box-shadow: 0px 8px 20px rgba(255, 255, 255, 0.6);
    animation: salir 1.2s ease-out forwards;
    animation-delay: 0.4s;
}


.caja3{
    width:240px;
    height:240px;
    background:white;
    position:absolute;
    top:120px;
    left:120px;
    z-index:3;
    overflow:hidden;
    box-shadow: 0px 8px 20px rgba(255, 255, 255, 0.6);
    animation: salir 1.2s ease-out forwards;
    animation-delay: 0.8s;
}


.caja1 img,
.caja2 img,
.caja3 img{
    width:100%;
    height:100%;
    object-fit:cover;
}


.caja1,
.caja2,
.caja3{
    box-shadow:0px 5px 15px rgba(255, 255, 255, 0.6);
}


.caja1:hover,
.caja2:hover,
.caja3:hover{
    transform: scale(1.1);
    transition: 0.3s;
    z-index:10;
}

</style>
</head>

<body>

<div class="contenedor">

    <div class="caja1">
        <img src="img/crash.jpg">
    </div>

    <div class="caja2">
        <img src="img/cf.jpg">
    </div>

    <div class="caja3">
        <img src="img/dtn.jpg">
    </div>

</div>

</body>
</html>
