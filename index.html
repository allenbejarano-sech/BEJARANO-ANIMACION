<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería Animada</title>

<style>

*{
    margin: 0px;
    padding: 0px;
    box-sizing: border-box;
}

body{
    background: #050505;
    font-family: Arial, Helvetica, sans-serif;
}

.contenedor{
    width: 1000px;
    height: 300px;
    position: relative;
    margin: 50px auto;
    border: 2px solid rgb(255, 253, 253);
    background-color: rgb(8, 8, 8);
    overflow: hidden;
    box-shadow: 0px 0px 20px rgb(31, 250, 2);
}


.titulo{
    position: absolute;
    top: 50%;
    left: -300px; 

    transform: translateY(-50%);

    color: white;
    font-size: 40px;
    font-weight: bold;
    text-align: center;

    box-shadow: 0px 5px 15px rgba(250, 248, 250, 0.952);
    background: rgba(193, 194, 192, 0.5);
    padding: 15px 25px;
    border-radius: 10px;
    z-index: 10;

    animation: tituloMove 2s ease-out forwards;
}
@keyframes tituloMove{
    0%{
        left: -300px;
        opacity: 0;
    }

    100%{
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 1;
    }
}


.marco1, .marco2, .marco3, .marco4, .marco5{
    width: 200px;
    height: 300px;
    position: absolute;
    overflow: hidden;
}

.marco1 img,
.marco2 img,
.marco3 img,
.marco4 img,
.marco5 img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}


.marco1{
    left: 0px;
    animation: animacion 6s infinite;
    box-shadow: 0px 5px 15px rgba(255, 255, 255, 0.9);
}

.marco2{
    left: 200px;
    animation: animacion 6s infinite;
    animation-delay: 0.3s;
    box-shadow: 0px 5px 15px rgba(255, 255, 255, 0.9);
}

.marco3{
    left: 400px;
    animation: animacion 6s infinite;
    animation-delay: 0.6s;
    box-shadow: 0px 5px 15px rgba(255, 255, 255, 0.9);
}

.marco4{
    left: 600px;
    animation: animacion 6s infinite;
    animation-delay: 0.9s;
    box-shadow: 0px 5px 15px rgba(255, 255, 255, 0.9);
}

.marco5{
    left: 800px;
    animation: animacion 6s infinite;
    animation-delay: 1.2s;
    box-shadow: 0px 5px 15px rgba(255, 255, 255, 0.9);
}

@keyframes animacion{

    0%{
        top: -300px;
        transform: rotateY(0deg);
    }

    50%{
        top: 0px;
        transform: rotateY(180deg);
    }

    100%{
        top: 0px;
        transform: rotateY(360deg);
    }
}

</style>
</head>

<body>

<div class="contenedor">

    <div class="titulo">
        ¡¡¡HERRAMIENTAS WEB!!!
    </div>

    <div class="marco1">
        <img src="img/bootstrap.png">
    </div>

    <div class="marco2">
        <img src="img/css.jpg">
    </div>

    <div class="marco3">
        <img src="img/html.jpg">
    </div>

    <div class="marco4">
        <img src="img/php.jpg">
    </div>

    <div class="marco5">
        <img src="img/javaScript.jpg">
    </div>

</div>

</body>
</html>
